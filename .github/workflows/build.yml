name: Buildozer Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # 버그 없는 검증된 환경 고정

    steps:
    - name: 1. 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 시스템 필수 패키지 세팅
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake git

    - name: 3. 순정 Buildozer 엔진으로 APK 굽기
      uses: jbcreations/buildozer-action@v2  # 현재 가장 안정적인 공식 대체 부품
      with:
        workdir: .
        buildozer_version: stable
