name: Buildozer Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 1. 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 자바 및 안드로이드 필수 패키지 통설치
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake git openjdk-17-jdk unzip zip
        pip install --upgrade pip
        pip install Cython==0.29.33 buildozer

    - name: 4. Buildozer 엔진으로 APK 직접 굽기
      run: |
        rm -rf .buildozer bin ~/.buildozer
        # yes 명령어 대신 Buildozer 자체 공식 안드로이드 약관 동의 옵션 사용
        buildozer android debug --auto-accept-licenses
